<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fluxus</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b;--bg2:#111113;--bg3:#18181b;--bg4:#1e1e22;
  --border:#27272a;--border2:#3f3f46;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --accentbg:rgba(228,228,231,0.06);
  --blue:#3b82f6;--green:#22c55e;--red:#ef4444;--purple:#8b5cf6;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --font:'Cabinet Grotesk',sans-serif;
  --font-display:'Clash Display',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 48px rgba(0,0,0,0.6);
}
[data-theme="light"]{
  --bg:#f4f4f5;--bg2:#ffffff;--bg3:#f9f9f9;--bg4:#efefef;
  --border:#e4e4e7;--border2:#d4d4d8;
  --text:#09090b;--text2:#52525b;--text3:#a1a1aa;
  --accentbg:rgba(24,24,27,0.06);
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 48px rgba(0,0,0,0.12);
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;transition:background .2s,color .2s}
.screen{position:fixed;inset:0;display:none;z-index:10}
.screen.active{display:flex}

/* LOGIN */
#loginScreen{flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,0.08) 0%,transparent 70%)}
.login-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;box-shadow:var(--shadow-lg);animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo-mark{width:36px;height:36px;background:var(--text);border-radius:9px;display:flex;align-items:center;justify-content:center}
.login-logo-mark svg{width:18px;height:18px;stroke:var(--bg);fill:none;stroke-width:2.5}
.login-logo-name{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.5px}
.login-title{font-family:var(--font-display);font-size:26px;font-weight:600;margin-bottom:6px;letter-spacing:-.5px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.5}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:13px 20px;border-radius:var(--radius);border:1.5px solid var(--border2);background:var(--bg3);cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);transition:all .18s}
.btn-google:hover{background:var(--bg4);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px;font-weight:600;letter-spacing:.5px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-input-group{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.login-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border .18s}
.login-input::placeholder{color:var(--text3)}
.login-input:focus{border-color:var(--blue)}
.btn-primary{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;transition:all .18s}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.login-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.login-switch span{color:var(--text);font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.login-error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px;display:none}
.login-error.show{display:block}

/* APP */
#appScreen{flex-direction:row;height:100%}

/* SIDEBAR */
.sidebar{width:72px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden;position:relative;z-index:20}
.sidebar.expanded{width:240px}
.sidebar-top{display:flex;flex-direction:column;align-items:center;width:100%;padding:0 12px;gap:2px}
.sidebar-logo{width:40px;height:40px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.sidebar-logo svg{width:20px;height:20px;stroke:var(--bg);fill:none;stroke-width:2.5}
.sidebar-logo-text{font-family:var(--font-display);font-size:17px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity .2s;margin-left:10px;letter-spacing:-.3px}
.sidebar.expanded .sidebar-logo-text{opacity:1}
.sidebar-logo-row{display:flex;align-items:center;width:100%;margin-bottom:8px}
.nav-item{display:flex;align-items:center;width:100%;padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;color:var(--text2);position:relative;gap:12px;border:none;background:none;font-family:var(--font)}
.nav-item:hover{background:var(--accentbg);color:var(--text)}
.nav-item.active{background:var(--accentbg);color:var(--text)}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-label{font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s}
.sidebar.expanded .nav-label{opacity:1}
.sidebar-spacer{flex:1}
.sidebar-bottom{display:flex;flex-direction:column;align-items:center;width:100%;padding:0 12px;gap:2px}
.avatar-btn{display:flex;align-items:center;width:100%;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;gap:10px;border:none;background:none;font-family:var(--font)}
.avatar-btn:hover{background:var(--accentbg)}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text);border:2px solid var(--border2);overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-info{opacity:0;transition:opacity .2s;text-align:left;overflow:hidden}
.sidebar.expanded .avatar-info{opacity:1}
.avatar-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.avatar-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

/* TOPBAR */
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--bg2);flex-shrink:0}
.topbar-toggle{width:34px;height:34px;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.topbar-toggle:hover{background:var(--accentbg);color:var(--text)}
.topbar-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-channel{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.topbar-channel svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2}
.topbar-spacer{flex:1}
.topbar-actions{display:flex;align-items:center;gap:4px}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.icon-btn:hover{background:var(--accentbg);color:var(--text)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* MESSAGES */
.messages-wrap{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.messages-wrap::-webkit-scrollbar{width:4px}
.messages-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-group{padding:6px 20px;display:flex;gap:14px;transition:background .1s;border-radius:4px}
.msg-group:hover{background:var(--accentbg)}
.msg-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text);margin-top:2px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-content{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-author{font-size:14px;font-weight:800;cursor:pointer;transition:color .15s}
.msg-author:hover{color:var(--blue)}
.msg-time{font-size:11px;color:var(--text3);font-weight:500}
.msg-text{font-size:14px;color:var(--text);line-height:1.55;word-break:break-word}
.msg-text a{color:var(--blue);text-decoration:none;font-weight:600}
.msg-text a:hover{text-decoration:underline}
.msg-continued{padding:2px 20px;display:flex;gap:14px}
.msg-continued:hover{background:var(--accentbg);border-radius:4px}
.msg-continued .msg-time-left{width:36px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;font-size:10px;color:transparent;transition:color .1s;padding-right:2px}
.msg-continued:hover .msg-time-left{color:var(--text3)}
.msg-own .msg-author{color:var(--blue)}

/* MEDIA IN MESSAGES */
.msg-img{max-width:320px;max-height:280px;border-radius:10px;margin-top:6px;cursor:pointer;transition:opacity .15s;display:block;object-fit:cover}
.msg-img:hover{opacity:.9}
.msg-video{max-width:320px;border-radius:10px;margin-top:6px;display:block}
.msg-file{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-top:6px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:all .15s}
.msg-file:hover{border-color:var(--border2);color:var(--text)}
.msg-file svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

/* UPLOAD PROGRESS */
.upload-progress{padding:8px 20px;font-size:12px;color:var(--text2);display:none;align-items:center;gap:10px}
.upload-progress.show{display:flex}
.progress-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0%}

/* TYPING */
.typing-indicator{padding:4px 20px;font-size:12px;color:var(--text3);min-height:24px}

/* INPUT */
.input-area{padding:12px 20px 16px;flex-shrink:0}
.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 8px 8px 14px;transition:border .18s}
.input-box:focus-within{border-color:var(--border2)}
.input-field{flex:1;border:none;background:none;outline:none;font-family:var(--font);font-size:14px;color:var(--text);resize:none;max-height:120px;line-height:1.5;padding:4px 0}
.input-field::placeholder{color:var(--text3)}
.input-actions{display:flex;gap:2px;align-items:flex-end;padding-bottom:2px}
.input-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.input-btn:hover{background:var(--accentbg);color:var(--text)}
.input-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.send-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:none;background:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{opacity:.8;transform:scale(1.05)}
.send-btn svg{width:15px;height:15px;stroke:var(--bg);fill:none;stroke-width:2.5}
.send-btn:disabled{opacity:.3;cursor:default;transform:none}
#fileInput{display:none}

/* CHANNELS */
.channels-panel{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1),opacity .25s}
.channels-panel.hidden{width:0;opacity:0}
.channels-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.channels-title{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.channel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:600;margin:1px 6px}
.channel-item:hover{background:var(--accentbg);color:var(--text)}
.channel-item.active{background:var(--accentbg);color:var(--text)}
.channel-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.channels-section{padding:8px 0;overflow-y:auto;flex:1}
.add-channel{display:flex;align-items:center;gap:8px;padding:8px 10px;margin:1px 6px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text3);font-size:12px;font-weight:600;transition:all .15s}
.add-channel:hover{background:var(--accentbg);color:var(--text2)}
.add-channel svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* DROPDOWN */
.dropdown{position:relative}
.dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:5px;min-width:180px;box-shadow:var(--shadow-lg);z-index:100;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.97);transition:all .18s cubic-bezier(.4,0,.2,1)}
.dropdown-menu.open{opacity:1;pointer-events:all;transform:none}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .12s;border:none;background:none;width:100%;font-family:var(--font)}
.dropdown-item:hover{background:var(--accentbg);color:var(--text)}
.dropdown-item.danger{color:var(--red)}
.dropdown-item.danger:hover{background:rgba(239,68,68,0.08)}
.dropdown-item svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.dropdown-sep{height:1px;background:var(--border);margin:4px 0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:420px;padding:28px;box-shadow:var(--shadow-lg);animation:fadeUp .25s ease both}
.modal-title{font-family:var(--font-display);font-size:19px;font-weight:600;margin-bottom:4px;letter-spacing:-.3px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.modal-input{width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border .18s;margin-bottom:14px}
.modal-input:focus{border-color:var(--blue)}
.modal-input::placeholder{color:var(--text3)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:9px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:none;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--accentbg);color:var(--text)}
.btn-confirm{padding:9px 16px;border-radius:var(--radius-sm);border:none;background:var(--text);color:var(--bg);font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;transition:all .15s}
.btn-confirm:hover{opacity:.85}

/* ── PROFILE POPUP (style Discord amélioré) ── */
.profile-overlay{position:fixed;inset:0;z-index:300;display:none}
.profile-overlay.open{display:block}
.profile-popup{position:fixed;z-index:301;width:300px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;animation:popIn .2s cubic-bezier(.34,1.56,.64,1);display:none}
.profile-popup.open{display:block}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.profile-banner{height:80px;background:linear-gradient(135deg,#1e3a5f,#2d1b69);position:relative;flex-shrink:0}
.profile-banner-color{height:100%;width:100%}
.profile-popup-av{position:absolute;bottom:-22px;left:16px;width:52px;height:52px;border-radius:50%;border:4px solid var(--bg2);overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;cursor:default}
.profile-popup-av img{width:100%;height:100%;object-fit:cover}
.profile-popup-body{padding:30px 16px 16px}
.profile-popup-name{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:2px}
.profile-popup-username{font-size:12px;color:var(--text3);margin-bottom:12px;font-weight:500}
.profile-popup-divider{height:1px;background:var(--border);margin:12px 0}
.profile-popup-section{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.profile-popup-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:10px}
.profile-popup-status .status-dot{width:8px;height:8px}
.profile-popup-joined{font-size:12px;color:var(--text3)}
.profile-popup-actions{display:flex;gap:6px;margin-top:12px}
.profile-action-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:none;background:var(--bg3);color:var(--text2);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.profile-action-btn:hover{background:var(--bg4);color:var(--text)}
.profile-action-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.profile-action-btn.primary{background:var(--blue);color:#fff}
.profile-action-btn.primary:hover{background:#2563eb}

/* IMAGE LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:400;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,0.2)}
.lightbox-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);padding:40px}
.empty-state svg{width:40px;height:40px;stroke:var(--border2);fill:none;stroke-width:1.5;margin-bottom:4px}
.empty-state-title{font-size:16px;font-weight:700;color:var(--text2)}
.empty-state-sub{font-size:13px;text-align:center;line-height:1.5;max-width:280px}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-size:13px;font-weight:600;box-shadow:var(--shadow);animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.toast.success{color:var(--green);border-color:rgba(34,197,94,.2)}
.toast.error{color:var(--red);border-color:rgba(239,68,68,.2)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:none}}

@media(max-width:640px){
  .sidebar{width:56px}.sidebar.expanded{width:200px}
  .channels-panel{position:fixed;left:56px;top:0;bottom:0;z-index:15;box-shadow:var(--shadow-lg)}
  .channels-panel.hidden{width:0}
  .topbar{padding:0 12px}
  .messages-wrap{padding:12px 0}
  .msg-group,.msg-continued{padding-left:12px;padding-right:12px}
  .input-area{padding:8px 12px 12px}
  .profile-popup{width:260px}
}

/* ── HOVER TOOLBAR (comme Discord) ── */
.msg-group{position:relative}
.msg-continued{position:relative}
.msg-toolbar{position:absolute;top:-14px;right:16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:3px;display:none;align-items:center;gap:1px;
  box-shadow:var(--shadow);z-index:10;animation:tbIn .12s ease}
@keyframes tbIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.msg-group:hover .msg-toolbar,.msg-continued:hover .msg-toolbar{display:flex}
.tb-btn{width:30px;height:30px;border-radius:7px;border:none;background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  color:var(--text2);transition:all .12s}
.tb-btn:hover{background:var(--accentbg);color:var(--text)}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 2px}

/* DROPDOWN MENU from toolbar */
.tb-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--radius);padding:5px;
  min-width:190px;box-shadow:var(--shadow-lg);z-index:100;
  display:none;animation:tbIn .15s ease}
.tb-dropdown.open{display:block}
.tb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .12s;
  border:none;background:none;width:100%;font-family:var(--font);text-align:left}
.tb-item:hover{background:var(--accentbg);color:var(--text)}
.tb-item.danger{color:var(--red)}
.tb-item.danger:hover{background:rgba(239,68,68,0.08)}
.tb-item svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.tb-sep-line{height:1px;background:var(--border);margin:4px 0}

/* REACTION PICKER */
.reaction-picker{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--radius);padding:8px;
  display:none;gap:4px;box-shadow:var(--shadow-lg);z-index:100;animation:tbIn .15s ease}
.reaction-picker.open{display:flex}
.rp-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:none;background:none;
  cursor:pointer;font-size:20px;transition:all .12s;display:flex;align-items:center;justify-content:center}
.rp-btn:hover{background:var(--accentbg);transform:scale(1.25)}

/* EDIT + REACTIONS */
.edit-input{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--blue);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;outline:none;margin-top:4px;resize:none;line-height:1.5}
.edit-hint{font-size:11px;color:var(--text3);margin-top:4px}
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.reaction-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;color:var(--text2)}
.reaction-pill:hover{border-color:var(--border2);background:var(--bg4)}
.reaction-pill.mine{border-color:var(--blue);background:rgba(59,130,246,0.08);color:var(--blue)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="login-logo-name">Fluxus</div>
    </div>
    <div class="login-title" id="loginTitle">Connexion</div>
    <div class="login-sub" id="loginSub">Content de te revoir.</div>
    <div class="login-error" id="loginError"></div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuer avec Google
    </button>
    <div class="login-divider">ou</div>
    <div class="login-input-group">
      <input class="login-input" type="text" id="loginName" placeholder="Nom d'affichage" style="display:none">
      <input class="login-input" type="email" id="loginEmail" placeholder="Email">
      <input class="login-input" type="password" id="loginPass" placeholder="Mot de passe">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="loginEmail()">Se connecter</button>
    <div class="login-switch" id="loginSwitch">Pas de compte ? <span onclick="toggleAuthMode()">S'inscrire</span></div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="appScreen">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo-row">
        <div class="sidebar-logo" onclick="toggleSidebar()"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
        <div class="sidebar-logo-text">Fluxus</div>
      </div>
      <button class="nav-item active" id="navGeneral" onclick="switchView('general')">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="nav-label">Discussion</span>
      </button>
      <button class="nav-item" id="navChannels" onclick="toggleChannels()">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Salons</span>
      </button>
    </div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-bottom">
      <button class="nav-item" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" id="themeIcon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <span class="nav-label">Thème</span>
      </button>
      <div class="dropdown">
        <button class="nav-item" onclick="toggleDropdown('settingsMenu')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
          <span class="nav-label">Paramètres</span>
        </button>
        <div class="dropdown-menu" id="settingsMenu">
          <button class="dropdown-item" onclick="openModal('profileModal');closeDropdown('settingsMenu')">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mon profil
          </button>
          <button class="dropdown-item" onclick="openModal('channelModal');closeDropdown('settingsMenu')">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Créer un salon
          </button>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger" onclick="logout();closeDropdown('settingsMenu')">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Déconnexion
          </button>
        </div>
      </div>
      <button class="avatar-btn" onclick="openMyProfile(event)">
        <div class="av" id="sidebarAvatar">?</div>
        <div class="avatar-info">
          <div class="avatar-name" id="sidebarName">Chargement...</div>
          <div class="avatar-status"><div class="status-dot"></div>En ligne</div>
        </div>
      </button>
    </div>
  </div>

  <div class="channels-panel hidden" id="channelsPanel">
    <div class="channels-header"><div class="channels-title">Salons</div></div>
    <div class="channels-section" id="channelsList"></div>
    <div class="add-channel" onclick="openModal('channelModal')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouveau salon
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="topbar-toggle" onclick="toggleChannels()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-channel">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span id="currentChannelName">général</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <div class="dropdown">
          <button class="icon-btn" onclick="toggleDropdown('moreMenu')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </button>
          <div class="dropdown-menu" id="moreMenu">
            <button class="dropdown-item" onclick="openModal('channelModal');closeDropdown('moreMenu')">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouveau salon
            </button>
            <button class="dropdown-item" onclick="toggleTheme();closeDropdown('moreMenu')">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>Thème
            </button>
            <div class="dropdown-sep"></div>
            <button class="dropdown-item danger" onclick="logout();closeDropdown('moreMenu')">
              <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Déconnexion
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="messages-wrap" id="messagesWrap">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <div class="empty-state-title">Début de la discussion</div>
        <div class="empty-state-sub">Sois le premier à écrire ici.</div>
      </div>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--blue);fill:none;stroke-width:2;flex-shrink:0"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="uploadText">Upload en cours...</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <div class="input-box">
        <textarea class="input-field" id="msgInput" placeholder="Envoyer un message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-actions">
          <button class="input-btn" onclick="document.getElementById('fileInput').click()" title="Envoyer un fichier">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button class="input-btn" onclick="openModal('channelModal')" title="Nouveau salon">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleFileUpload(this)">
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="channelModal">
  <div class="modal">
    <div class="modal-title">Nouveau salon</div>
    <div class="modal-sub">Crée un espace de discussion</div>
    <input class="modal-input" id="channelNameInput" placeholder="nom-du-salon" maxlength="30" onkeydown="if(event.key==='Enter')createChannel()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('channelModal')">Annuler</button>
      <button class="btn-confirm" onclick="createChannel()">Créer</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-title">Mon profil</div>
    <div class="modal-sub">Modifie ton nom d'affichage</div>
    <input class="modal-input" id="newNameInput" placeholder="Nouveau nom" onkeydown="if(event.key==='Enter')updateName()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('profileModal')">Annuler</button>
      <button class="btn-confirm" onclick="updateName()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- PROFILE POPUP -->
<div class="profile-overlay" id="profileOverlay" onclick="closeProfilePopup()"></div>
<div class="profile-popup" id="profilePopup">
  <div class="profile-banner">
    <div class="profile-banner-color" id="profileBannerColor"></div>
    <div class="profile-popup-av" id="profilePopupAv"></div>
  </div>
  <div class="profile-popup-body">
    <div class="profile-popup-name" id="profilePopupName"></div>
    <div class="profile-popup-username" id="profilePopupUsername"></div>
    <div class="profile-popup-divider"></div>
    <div class="profile-popup-section">Statut</div>
    <div class="profile-popup-status"><div class="status-dot"></div><span>En ligne sur Fluxus</span></div>
    <div class="profile-popup-section">Membre depuis</div>
    <div class="profile-popup-joined" id="profilePopupJoined"></div>
    <div class="profile-popup-actions" id="profilePopupActions"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toolbar is injected per-message in JS -->

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, doc, setDoc, getDoc, getDocs, limit }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ✅ CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBlSYrryaQMIOe7WRTIcwtctP-37zO_g60",
  authDomain: "fluxus-60710.firebaseapp.com",
  projectId: "fluxus-60710",
  storageBucket: "fluxus-60710.firebasestorage.app",
  messagingSenderId: "368423653994",
  appId: "1:368423653994:web:957fea961c251c4a0ab013"
};

// ✅ CONFIG CLOUDINARY
const CLOUDINARY_CLOUD = 'dji7sqcyh';
const CLOUDINARY_PRESET = 'fluxus_uploads';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

let currentUser = null;
let currentChannel = 'general';
let channels = ['general'];
let unsubMessages = null;
let isSignup = false;
let lastMsgAuthor = null;
let lastMsgTime = null;

// ── AUTH ──────────────────────────────────
window.loginGoogle = async () => {
  try { const r = await signInWithPopup(auth, googleProvider); await saveUser(r.user); }
  catch(e) { showError(e.message); }
};

window.loginEmail = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const name = document.getElementById('loginName').value.trim();
  if (!email || !pass) { showError('Remplis tous les champs'); return; }
  try {
    if (isSignup) {
      if (!name) { showError("Entre un nom d'affichage"); return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await saveUser(cred.user);
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    const msgs = {'auth/user-not-found':'Compte introuvable','auth/wrong-password':'Mot de passe incorrect','auth/email-already-in-use':'Email déjà utilisé','auth/weak-password':'Mot de passe trop faible','auth/invalid-email':'Email invalide','auth/invalid-credential':'Email ou mot de passe incorrect'};
    showError(msgs[e.code] || e.message);
  }
};

window.toggleAuthMode = () => {
  isSignup = !isSignup;
  document.getElementById('loginTitle').textContent = isSignup ? 'Créer un compte' : 'Connexion';
  document.getElementById('loginSub').textContent = isSignup ? 'Rejoins Fluxus.' : 'Content de te revoir.';
  document.getElementById('loginBtn').textContent = isSignup ? "S'inscrire" : 'Se connecter';
  document.getElementById('loginSwitch').innerHTML = isSignup
    ? "Déjà un compte ? <span onclick='toggleAuthMode()'>Se connecter</span>"
    : "Pas de compte ? <span onclick='toggleAuthMode()'>S'inscrire</span>";
  document.getElementById('loginName').style.display = isSignup ? 'block' : 'none';
  hideError();
};

async function saveUser(user) {
  await setDoc(doc(db, 'users', user.uid), {
    name: user.displayName || user.email?.split('@')[0] || 'Utilisateur',
    email: user.email,
    photoURL: user.photoURL || null,
    joinedAt: serverTimestamp(),
  }, { merge: true });
}

window.logout = async () => { await signOut(auth); };

window.updateName = async () => {
  const name = document.getElementById('newNameInput').value.trim();
  if (!name || !currentUser) return;
  await updateProfile(currentUser, { displayName: name });
  await setDoc(doc(db, 'users', currentUser.uid), { name }, { merge: true });
  updateSidebarUser(currentUser);
  closeModal('profileModal');
  showToast('Nom mis à jour !', 'success');
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('appScreen').classList.add('active');
    await saveUser(user);
    updateSidebarUser(user);
    await loadChannels();
    switchChannel(currentChannel);
  } else {
    currentUser = null;
    document.getElementById('appScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
  }
});

function updateSidebarUser(user) {
  const name = user.displayName || user.email?.split('@')[0] || 'Utilisateur';
  document.getElementById('sidebarName').textContent = name;
  const av = document.getElementById('sidebarAvatar');
  av.innerHTML = user.photoURL
    ? `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover">`
    : name.charAt(0).toUpperCase();
}

// ── CHANNELS ─────────────────────────────
async function loadChannels() {
  const snap = await getDocs(collection(db, 'channels'));
  if (snap.empty) {
    await setDoc(doc(db, 'channels', 'general'), { name: 'général', createdAt: serverTimestamp() });
    channels = ['general'];
  } else {
    channels = snap.docs.map(d => d.id);
  }
  renderChannels();
}

function renderChannels() {
  document.getElementById('channelsList').innerHTML = channels.map(ch => `
    <div class="channel-item ${ch===currentChannel?'active':''}" onclick="switchChannel('${ch}')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${ch}
    </div>`).join('');
}

window.createChannel = async () => {
  const raw = document.getElementById('channelNameInput').value.trim();
  if (!raw) return;
  const name = raw.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  if (!name) { showToast('Nom invalide','error'); return; }
  if (channels.includes(name)) { showToast('Ce salon existe déjà','error'); return; }
  await setDoc(doc(db,'channels',name),{name,createdAt:serverTimestamp()});
  channels.push(name);
  renderChannels();
  closeModal('channelModal');
  switchChannel(name);
  document.getElementById('channelNameInput').value='';
  showToast('Salon créé !','success');
};

window.switchChannel = (ch) => {
  currentChannel = ch;
  document.getElementById('currentChannelName').textContent = ch;
  renderChannels();
  lastMsgAuthor = null; lastMsgTime = null;
  if (unsubMessages) unsubMessages();
  loadMessages(ch);
  if (window.innerWidth < 640) document.getElementById('channelsPanel').classList.add('hidden');
};

// ── MESSAGES ─────────────────────────────
function loadMessages(channel) {
  const wrap = document.getElementById('messagesWrap');
  wrap.innerHTML = `<div class="empty-state" id="emptyState"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><div class="empty-state-title">Début de la discussion</div><div class="empty-state-sub">Sois le premier à écrire ici.</div></div>`;
  const q = query(collection(db,'channels',channel,'messages'),orderBy('createdAt'),limit(100));
  unsubMessages = onSnapshot(q,(snap) => {
    let first = !!wrap.querySelector('#emptyState');
    if (first) wrap.innerHTML = '';
    snap.docChanges().forEach(c => {
      if (c.type==='added') {
        const msg = {id:c.doc.id,...c.doc.data()};
        if (!wrap.querySelector(`[data-id="${msg.id}"]`)) appendMessage(msg);
      }
    });
    wrap.scrollTop = wrap.scrollHeight;
  });
}

function makeLinksClickable(text) {
  const urlRegex = /(https?:\/\/[^\s<>"]+)/g;
  return escHtml(text).replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

function appendMessage(msg) {
  const wrap = document.getElementById('messagesWrap');
  const isOwn = msg.uid === currentUser?.uid;
  const time = msg.createdAt?.toDate?.() || new Date();
  const timeStr = time.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const isContinued = lastMsgAuthor===msg.uid && (time-lastMsgTime) < 5*60*1000;
  const initials = (msg.authorName||'?').charAt(0).toUpperCase();
  const hue = (msg.uid||'').charCodeAt(0)*5%360;
  const avatarHtml = msg.photoURL
    ? `<div class="msg-av" onclick="showProfile('${msg.uid}','${escHtml(msg.authorName||'')}','${escHtml(msg.authorEmail||'')}','${escHtml(msg.photoURL||'')}',event)"><img src="${msg.photoURL}" alt=""></div>`
    : `<div class="msg-av" style="background:hsl(${hue},40%,40%)" onclick="showProfile('${msg.uid}','${escHtml(msg.authorName||'')}','${escHtml(msg.authorEmail||'')}','',event)">${initials}</div>`;

  // Contenu du message (texte + media)
  let content = '';
  if (msg.text) content += `<div class="msg-text">${makeLinksClickable(msg.text)}</div>`;
  if (msg.mediaUrl) {
    if (msg.mediaType === 'video') {
      content += `<video class="msg-video" src="${msg.mediaUrl}" controls></video>`;
    } else {
      content += `<img class="msg-img" src="${msg.mediaUrl}" alt="image" onclick="openLightbox('${msg.mediaUrl}')">`;
    }
  }

  const tb = toolbarHTML(msg.id, msg.uid, msg.text || '');

  if (isContinued) {
    const el = document.createElement('div');
    el.className = 'msg-continued'; el.dataset.id = msg.id;
    el.innerHTML = `${tb}<div class="msg-time-left">${timeStr}</div><div>${content}</div>`;
    wrap.appendChild(el);
  } else {
    const el = document.createElement('div');
    el.className = `msg-group ${isOwn?'msg-own':''}`; el.dataset.id = msg.id;
    el.innerHTML = `${tb}${avatarHtml}<div class="msg-content">
      <div class="msg-header">
        <span class="msg-author" onclick="showProfile('${msg.uid}','${escHtml(msg.authorName||'')}','${escHtml(msg.authorEmail||'')}','${escHtml(msg.photoURL||'')}',event)">${escHtml(msg.authorName||'Utilisateur')}</span>
        <span class="msg-time">${timeStr}</span>
      </div>${content}</div>`;
    wrap.appendChild(el);
  }
  lastMsgAuthor = msg.uid; lastMsgTime = time;
}

window.sendMessage = async () => {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  input.value = ''; autoResize(input);
  document.getElementById('sendBtn').disabled = true;
  await addDoc(collection(db,'channels',currentChannel,'messages'),{
    text, uid: currentUser.uid,
    authorName: currentUser.displayName||currentUser.email?.split('@')[0]||'Utilisateur',
    authorEmail: currentUser.email||'',
    photoURL: currentUser.photoURL||null,
    createdAt: serverTimestamp(),
  });
};

// ── CLOUDINARY UPLOAD ─────────────────────
window.handleFileUpload = async (input) => {
  const file = input.files[0];
  if (!file || !currentUser) return;
  input.value = '';

  const isVideo = file.type.startsWith('video/');
  const maxSize = isVideo ? 100*1024*1024 : 10*1024*1024;
  if (file.size > maxSize) { showToast(`Fichier trop lourd (max ${isVideo?'100MB':'10MB'})`, 'error'); return; }

  // Afficher la progress bar
  const prog = document.getElementById('uploadProgress');
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('uploadText');
  prog.classList.add('show');
  txt.textContent = `Upload ${isVideo?'vidéo':'image'} en cours...`;
  fill.style.width = '0%';

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);

    // XMLHttpRequest pour suivre la progression
    const url = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) fill.style.width = Math.round(e.loaded/e.total*100)+'%';
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          resolve(data.secure_url);
        } else {
          reject(new Error('Upload échoué'));
        }
      };
      xhr.onerror = () => reject(new Error('Erreur réseau'));
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`);
      xhr.send(formData);
    });

    prog.classList.remove('show');

    // Envoyer le message avec le media
    await addDoc(collection(db,'channels',currentChannel,'messages'),{
      text: '',
      mediaUrl: url,
      mediaType: isVideo ? 'video' : 'image',
      uid: currentUser.uid,
      authorName: currentUser.displayName||currentUser.email?.split('@')[0]||'Utilisateur',
      authorEmail: currentUser.email||'',
      photoURL: currentUser.photoURL||null,
      createdAt: serverTimestamp(),
    });

    showToast(`${isVideo?'Vidéo':'Image'} envoyée !`, 'success');
  } catch(e) {
    prog.classList.remove('show');
    showToast('Erreur upload: ' + e.message, 'error');
  }
};

// ── PROFILE POPUP ─────────────────────────
window.showProfile = (uid, name, email, photoURL, e) => {
  e.stopPropagation();
  const popup = document.getElementById('profilePopup');
  const overlay = document.getElementById('profileOverlay');

  // Banner couleur basée sur l'UID
  const hue = uid.charCodeAt(0)*5%360;
  document.getElementById('profileBannerColor').style.background = `linear-gradient(135deg, hsl(${hue},50%,20%), hsl(${(hue+60)%360},40%,15%))`;

  // Avatar
  const av = document.getElementById('profilePopupAv');
  av.style.background = `hsl(${hue},40%,40%)`;
  av.innerHTML = photoURL
    ? `<img src="${photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : name.charAt(0).toUpperCase();

  document.getElementById('profilePopupName').textContent = name || 'Utilisateur';
  document.getElementById('profilePopupUsername').textContent = email || '';
  document.getElementById('profilePopupJoined').textContent = 'Membre de Fluxus';

  // Actions — pas de bouton message sur son propre profil
  const actions = document.getElementById('profilePopupActions');
  if (uid !== currentUser?.uid) {
    actions.innerHTML = `<button class="profile-action-btn primary" onclick="startDM('${uid}','${escHtml(name)}')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Message
    </button>`;
  } else {
    actions.innerHTML = `<button class="profile-action-btn" onclick="openModal('profileModal');closeProfilePopup()">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Modifier
    </button>`;
  }

  // Positionner le popup
  const rect = e.target.getBoundingClientRect();
  let left = rect.right + 10;
  let top = rect.top;
  if (left + 300 > window.innerWidth) left = rect.left - 310;
  if (top + 320 > window.innerHeight) top = window.innerHeight - 330;
  popup.style.left = Math.max(8, left) + 'px';
  popup.style.top = Math.max(8, top) + 'px';

  overlay.classList.add('open');
  popup.classList.add('open');
};

window.openMyProfile = (e) => {
  if (!currentUser) return;
  const name = currentUser.displayName || currentUser.email?.split('@')[0] || 'Utilisateur';
  showProfile(currentUser.uid, name, currentUser.email||'', currentUser.photoURL||'', e);
};

window.closeProfilePopup = () => {
  document.getElementById('profilePopup').classList.remove('open');
  document.getElementById('profileOverlay').classList.remove('open');
};

window.startDM = (uid, name) => {
  closeProfilePopup();
  showToast(`Message privé à ${name} — bientôt disponible !`, '');
};

// ── LIGHTBOX ──────────────────────────────
window.openLightbox = (url) => {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = () => {
  document.getElementById('lightbox').classList.remove('open');
};

// ── UI ────────────────────────────────────
window.handleKey = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.autoResize = (el) => {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('sendBtn').disabled=!el.value.trim();
};
window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('expanded');
window.toggleChannels = () => document.getElementById('channelsPanel').classList.toggle('hidden');
window.switchView = (v) => {
  document.getElementById('navGeneral').classList.toggle('active',v==='general');
};

window.toggleTheme = () => {
  const isLight = document.documentElement.hasAttribute('data-theme');
  if (isLight) { document.documentElement.removeAttribute('data-theme'); }
  else { document.documentElement.setAttribute('data-theme','light'); }
  const icon = document.getElementById('themeIcon');
  icon.innerHTML = !isLight
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>'
    : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
  localStorage.setItem('fluxus-theme', !isLight ? 'light' : 'dark');
};

const savedTheme = localStorage.getItem('fluxus-theme');
if (savedTheme === 'light') {
  document.documentElement.setAttribute('data-theme','light');
  setTimeout(() => {
    const icon = document.getElementById('themeIcon');
    if(icon) icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>';
  },100);
}

window.toggleDropdown = (id) => {
  const m = document.getElementById(id);
  const open = m.classList.contains('open');
  document.querySelectorAll('.dropdown-menu').forEach(x=>x.classList.remove('open'));
  if(!open) m.classList.add('open');
};
window.closeDropdown = (id) => document.getElementById(id).classList.remove('open');

document.addEventListener('click',(e) => {
  if(!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));
});

window.openModal = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',(e)=>{if(e.target===o)o.classList.remove('open');});
});

window.showToast = (msg, type='') => {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',error:'<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'};
  t.innerHTML=(icons[type]||'')+msg;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(8px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300);},3000);
};


// ── HOVER TOOLBAR ────────────────────────
let tbMsgId = null;
let tbMsgUid = null;
let tbMsgText = null;

function toolbarHTML(msgId, msgUid, msgText) {
  const isOwn = msgUid === currentUser?.uid;
  const ownBtns = isOwn ? `
    <div class="tb-sep"></div>
    <button class="tb-btn" title="Modifier" onclick="tbEdit('${msgId}')">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="tb-btn" title="Supprimer" onclick="tbDelete('${msgId}')" style="color:var(--red)">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </button>` : '';

  return `<div class="msg-toolbar" id="tb-${msgId}">
    <div style="position:relative">
      <button class="tb-btn" title="Réagir" onclick="toggleReactionPicker('${msgId}',event)">😊</button>
      <div class="reaction-picker" id="rp-${msgId}">
        <button class="rp-btn" onclick="addReaction('👍','${msgId}')">👍</button>
        <button class="rp-btn" onclick="addReaction('❤️','${msgId}')">❤️</button>
        <button class="rp-btn" onclick="addReaction('😂','${msgId}')">😂</button>
        <button class="rp-btn" onclick="addReaction('🔥','${msgId}')">🔥</button>
        <button class="rp-btn" onclick="addReaction('😮','${msgId}')">😮</button>
      </div>
    </div>
    <button class="tb-btn" title="Répondre" onclick="tbReply('${msgId}','${msgUid}')">
      <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
    </button>
    <button class="tb-btn" title="Copier" onclick="tbCopy('${msgId}')">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    </button>
    ${ownBtns}
  </div>`;
}

window.toggleReactionPicker = (msgId, e) => {
  e.stopPropagation();
  const picker = document.getElementById('rp-' + msgId);
  if (!picker) return;
  const isOpen = picker.classList.contains('open');
  document.querySelectorAll('.reaction-picker').forEach(p => p.classList.remove('open'));
  if (!isOpen) picker.classList.add('open');
};

document.addEventListener('click', () => {
  document.querySelectorAll('.reaction-picker').forEach(p => p.classList.remove('open'));
});

window.tbCopy = (msgId) => {
  const wrap = document.getElementById('messagesWrap');
  const msgEl = wrap.querySelector('[data-id="' + msgId + '"]');
  const textEl = msgEl?.querySelector('.msg-text');
  if (textEl) {
    navigator.clipboard.writeText(textEl.innerText).then(() => showToast('Texte copié !', 'success'));
  }
};

window.tbReply = (msgId, uid) => {
  const wrap = document.getElementById('messagesWrap');
  const msgEl = wrap.querySelector('[data-id="' + msgId + '"]');
  const authorEl = msgEl?.querySelector('.msg-author');
  const name = authorEl?.textContent || 'quelqu\'un';
  const input = document.getElementById('msgInput');
  input.value = '@' + name + ' ';
  input.focus();
  autoResize(input);
};

window.tbEdit = (msgId) => {
  const wrap = document.getElementById('messagesWrap');
  const msgEl = wrap.querySelector('[data-id="' + msgId + '"]');
  if (!msgEl) return;
  const textEl = msgEl.querySelector('.msg-text');
  if (!textEl) return;
  const original = textEl.innerText;
  textEl.style.display = 'none';

  const editArea = document.createElement('textarea');
  editArea.className = 'edit-input';
  editArea.value = original;
  editArea.rows = 1;
  const hint = document.createElement('div');
  hint.className = 'edit-hint';
  hint.textContent = 'Entrée pour sauvegarder • Échap pour annuler';
  textEl.parentNode.insertBefore(editArea, textEl.nextSibling);
  textEl.parentNode.insertBefore(hint, editArea.nextSibling);
  editArea.focus();
  editArea.style.height = Math.min(editArea.scrollHeight, 120) + 'px';

  editArea.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const newText = editArea.value.trim();
      if (newText && newText !== original) {
        try {
          const { updateDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
          await updateDoc(doc(db, 'channels', currentChannel, 'messages', msgId), { text: newText, edited: true });
          textEl.innerHTML = makeLinksClickable(newText);
          showToast('Message modifié !', 'success');
        } catch(err) { showToast('Erreur modification', 'error'); }
      }
      textEl.style.display = '';
      editArea.remove(); hint.remove();
    }
    if (e.key === 'Escape') {
      textEl.style.display = '';
      editArea.remove(); hint.remove();
    }
  });
};

window.tbDelete = async (msgId) => {
  if (!currentUser) return;
  try {
    const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await deleteDoc(doc(db, 'channels', currentChannel, 'messages', msgId));
    const wrap = document.getElementById('messagesWrap');
    const msgEl = wrap.querySelector('[data-id="' + msgId + '"]');
    if (msgEl) { msgEl.style.opacity='0'; msgEl.style.transition='opacity .2s'; setTimeout(()=>msgEl.remove(),200); }
    showToast('Message supprimé', '');
  } catch(e) { showToast('Erreur suppression', 'error'); }
};

window.addReaction = async (emoji, msgId) => {
  document.querySelectorAll('.reaction-picker').forEach(p => p.classList.remove('open'));
  if (!msgId || !currentUser) return;
  try {
    const { updateDoc, getDoc: gd } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const msgRef = doc(db, 'channels', currentChannel, 'messages', msgId);
    const msgSnap = await gd(msgRef);
    const reactions = { ...(msgSnap.data()?.reactions || {}) };
    const users = reactions[emoji] || [];
    const uid = currentUser.uid;
    reactions[emoji] = users.includes(uid) ? users.filter(u => u !== uid) : [...users, uid];
    await updateDoc(msgRef, { reactions });
    const wrap = document.getElementById('messagesWrap');
    const msgEl = wrap.querySelector('[data-id="' + msgId + '"]');
    if (msgEl) updateReactionPills(msgEl, reactions, msgId);
  } catch(e) { showToast('Erreur réaction', 'error'); }
};

function updateReactionPills(msgEl, reactions, msgId) {
  let pillsEl = msgEl.querySelector('.msg-reactions');
  if (!pillsEl) {
    pillsEl = document.createElement('div');
    pillsEl.className = 'msg-reactions';
    const content = msgEl.querySelector('.msg-content') || msgEl;
    content.appendChild(pillsEl);
  }
  pillsEl.innerHTML = Object.entries(reactions)
    .filter(([,users]) => users.length > 0)
    .map(([emoji, users]) => {
      const mine = users.includes(currentUser?.uid);
      return `<span class="reaction-pill ${mine?'mine':''}" onclick="addReaction('${emoji}','${msgId}')">${emoji} ${users.length}</span>`;
    }).join('');
}

function showError(msg){const el=document.getElementById('loginError');el.textContent=msg;el.classList.add('show');}
function hideError(){document.getElementById('loginError').classList.remove('show');}
function escHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
